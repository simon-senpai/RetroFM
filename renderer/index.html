<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RetroFM</title>
  <link rel="stylesheet" href="css/fonts.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/onboarding.css">
  <link rel="stylesheet" href="css/station.css">
  <link rel="stylesheet" href="css/speaking.css">
</head>
<body>
<div id="app">
  <nav class="nav">
    <div class="logo">
      <span class="logo-star">✳</span>
      RetroFM
      <span id="onair-badge">ON AIR</span>
    </div>
    <button class="btn-login" id="btn-login">♫ Login</button>
  </nav>

  <!-- Onboarding view -->
  <div id="view-onboarding">
    <div id="onboarding-content"></div>
  </div>

  <!-- Station view -->
  <div id="view-station">
    <div id="clock-zone">
      <div id="dot-clock"></div>
      <div id="clock-date"></div>
    </div>
    <div id="player-bar">
      <div id="eq-bars">
        <span></span><span></span><span></span><span></span>
      </div>
      <div id="track-info">
        <div id="track-name">—</div>
        <div id="track-artist">—</div>
      </div>
      <div id="player-controls">
        <button id="btn-prev"><svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><rect x="0" y="0" width="2.5" height="12"/><polygon points="2.5,6 12,0 12,12"/></svg></button>
        <button id="btn-play"><svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><rect x="0" y="0" width="4" height="12"/><rect x="7" y="0" width="4" height="12"/></svg></button>
        <button id="btn-next"><svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><polygon points="0,0 0,12 9.5,6"/><rect x="9.5" y="0" width="2.5" height="12"/></svg></button>
        <button id="btn-like"><svg width="13" height="13" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"><path d="M6,10.3 C5.2,9.6 1,6.6 1,4 C1,2.3 2.3,1 4,1 C5,1 5.7,1.6 6,2.1 C6.3,1.6 7,1 8,1 C9.7,1 11,2.3 11,4 C11,6.6 6.8,9.6 6,10.3Z"/></svg></button>
      </div>
    </div>
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <div id="progress-times">
      <span id="time-current">0:00</span>
      <span id="time-total">0:00</span>
    </div>
    <div id="queue-section">
      <div id="queue-header">
        <span id="queue-name">—</span>
        <div style="display:flex;align-items:center;gap:8px">
          <span id="queue-count">—</span>
          <button id="btn-refresh" title="New program">↺</button>
        </div>
      </div>
      <div id="queue-list"></div>
    </div>
    <div id="chat-section">
      <div id="chat-header">
        <span class="dj-name">Sine</span>
        <span class="live-badge">LIVE</span>
      </div>
      <div id="chat-history"></div>
      <div id="chat-input-row">
        <input type="text" id="chat-input" placeholder="Say something to the DJ...">
        <button id="chat-send">↑</button>
      </div>
    </div>
  </div>

  <!-- Speaking view -->
  <div id="view-speaking">
    <div id="speaking-header">
      <div class="logo">
        <span class="logo-star">✳</span>
        RetroFM
      </div>
      <span id="speaking-status">● Speaking...</span>
      <span id="speaking-time">0:00</span>
    </div>
    <div id="dj-waveform"></div>
    <div id="speaking-card">
      <div id="episode-title">—</div>
      <div id="episode-song">—</div>
      <div id="song-progress-bar"><div id="song-progress-fill"></div></div>
      <div id="song-times">
        <span id="song-time-current">0:00</span>
        <span id="song-time-total">0:00</span>
      </div>
      <div id="transcript"></div>
      <div id="song-waveform"></div>
      <div id="speaking-bottom">
        <span id="dj-playback-time">0:00</span>
        <button id="btn-pause-speaking">⏸</button>
      </div>
    </div>
  </div>
</div>

<audio id="audio-player"></audio>
<audio id="dj-audio"></audio>

<script src="js/api.js"></script>
<script src="js/clock.js"></script>
<script src="js/waveform.js"></script>
<script src="js/player.js"></script>
<script src="js/chat.js"></script>
<script src="js/station.js"></script>
<script src="js/speaking.js"></script>
<script src="js/app.js"></script>
</body>
</html>
